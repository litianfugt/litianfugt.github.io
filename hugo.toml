# 基础配置
baseURL = "https://litianfugt.github.io/"
languageCode = "zh-CN"
title = "李石原的博客"
theme = "PaperMod"
publishDir = "public"
summaryLength = 70
pagination.pagerSize = 10
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsStyle = "monokai"

# 静态文件配置
[mediaTypes]
  [mediaTypes."text/javascript"]
    suffixes = ["js"]

# 主菜单配置
[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 3

[[menu.main]]
  identifier = "thoughts"
  name = "随想"
  url = "/thoughts/"
  weight = 4

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 5

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 10

# PaperMod 主题配置
[params]
  env = "production"
  description = "李石原的个人技术博客，专注于图像算法、计算机视觉和深度学习技术分享"
  author = "李石原"
  keywords = ["图像算法", "计算机视觉", "深度学习", "机器学习", "技术博客"]

  # 文章显示选项
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  showtoc = true
  tocopen = false

  # 滚动与动画
  disableScrollToTop = false

  # 搜索配置
  [params.search]
    enable = true
    maxResults = 10
    contentLength = 1000
    highlight = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 100
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]
    limit = 10

  # 深色模式
  defaultTheme = "auto"
  disableThemeToggle = false

  # 主页信息
  [params.homeInfoParams]
    Title = "李石原的技术博客"
    Content = "图像算法工程师 | 计算机视觉 | 深度学习 | 技术分享"

  # 社交链接
  [params.social]
    GitHub = "litianfugt"
    Email = "diego_litianfu@163.com"
    RSS = true

  # 网站图标
  [params.label]
    text = "首页"
    icon = "/apple-touch-icon.png"
    iconHeight = 35

  # 头像模式（未启用）
  [params.profileMode]
    enabled = false

  # SEO 配置
  [params.seo]
    twitterCard = "summary_large_image"

  # 评论系统
  [params.comments]
    enable = true
    [params.comments.giscus]
      repo = "litianfugt/litianfugt.github.io"
      repoId = "R_kgDOPkZVNQ"
      category = "General"
      categoryId = "DIC_kwDOPkZVNc4Cv3cN"
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "1"
      inputPosition = "bottom"
      theme = "preferred_color_scheme"
      lang = "zh-CN"
      loading = "lazy"

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    isPlainText = true
    isHTML = false
    notAlternative = true

# Markdown 配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
