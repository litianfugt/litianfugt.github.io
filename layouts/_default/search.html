{{- define "main" }}

<header class="page-header search-header">
    <h1 class="search-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        {{- .Title | htmlUnescape -}}
    </h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
</header>

<div class="search-container">
    <div class="search-box-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default "搜索文章..." }}"
            aria-label="search" type="search" autocomplete="off" maxlength="64">
        <kbd class="search-shortcut">⌘K</kbd>
    </div>
    <div id="searchResults" class="search-results"></div>
    <div class="search-tips">
        <p>输入关键词快速查找文章，支持标题、内容和标签搜索</p>
    </div>
</div>

{{- end }}{{- /* end main */}}
